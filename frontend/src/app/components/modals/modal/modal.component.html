@if (isOpen()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="relative w-full md:w-4/6 lg:w-3/6 xl:w-2/5 mx-auto">
      <div class="flex flex-col w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="flex items-center px-6 py-4 border-b border-gray-200">
          <button (click)="handleClose()" class="rounded-full hover:bg-gray-100" type="button">
            <ng-icon name="heroXMark" size="18" />
          </button>
          <span class="flex-1 text-center text-base font-semibold">{{ title() }}</span>
        </div>
        <div class="p-6">
          <ng-content select="[body]" />
        </div>
        @if (error()) {
          <p class="text-rose-500 text-sm text-center mt- pb-3">
            {{ error() }}
          </p>
        }
        <div class="flex flex-col gap-3 px-6 pb-6">
          <div class="flex gap-3 w-full">
            @if (hasSecondaryLabel()) {
              <button
                class="disabled:opacity-70 disabled:cursor-not-allowed rounded-lg hover:opacity-80 w-full bg-white border-black text-black py-3 text-md font-semibold border-2"
                (click)="handleSecondaryLabel()"
              >
                {{ secondaryLabel() }}
              </button>
            }
            <button
              class="disabled:opacity-70 disabled:cursor-not-allowed rounded-lg hover:opacity-80 w-full bg-sky-600 border-sky-500 text-white py-3 text-md font-semibold border-2"
              (click)="handleClick()"
            >
              {{ label() }}
            </button>
          </div>
          <ng-content select="[footer]" class="" />
        </div>
      </div>
    </div>
  </div>
}
