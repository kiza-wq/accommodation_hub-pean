<div class="col-span-1 cursor-pointer group">
  <div class="flex flex-col gap-2 w-full" (click)="navigateToListing()">
    <div class="aspect-square w-full overflow-hidden rounded-xl">
      <img
        [src]="data().imageSrc"
        [alt]="data().title"
        class="object-contain h-full w-full group-hover:scale-120 transition duration-300"
      />
    </div>

    <div class="font-semibold text-lg">{{ location()?.region }}, {{ location()?.label }}</div>
    <div class="font-light text-neutral-500">{{ data().category }}</div>
    <div class="flex items-center gap-1">
      <div class="font-semibold">€ {{ data().price }}</div>
      <div class="font-light">night</div>
    </div>
  </div>
  @if (actionLabel()) {
    <button
      type="button"
      class="relative mt-2 bg-sky-500 text-white py-1 rounded-lg hover:bg-sky-900 w-full"
      (click)="handleClick()"
    >
      {{ actionLabel() }}
    </button>
  }
</div>
