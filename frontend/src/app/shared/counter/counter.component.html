<div class="flex items-center justify-between">
  <div class="flex flex-col">
    <div class="font-medium">{{ title() }}</div>
    <div class="font-light text-gray-600">{{ subTitle() }}</div>
  </div>

  <div class="flex items-center gap-4">
    <div
      (click)="onReduce()"
      class="w-10 h-10 rounded-full border border-neutral-400 flex items-center justify-center text-neutral-600 cursor-pointer hover:opacity-80"
    >
      -
    </div>
    <div>{{ count() }}</div>
    <div
      (click)="onAdd()"
      class="w-10 h-10 rounded-full border border-neutral-400 flex items-center justify-center text-neutral-600 cursor-pointer hover:opacity-80"
    >
      +
    </div>
  </div>
</div>
